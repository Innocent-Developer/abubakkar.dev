    .dim{color:var(--text-dim)}

    a:hover::after{content:" ↗"}
    .cursor{display:inline-block;width:9px;height:18px;background:var(--accent);vertical-align:text-bottom;animation:blink 1s steps(1) infinite}
    @keyframes blink{50%{opacity:0}}
    @media (prefers-reduced-motion: reduce){.cursor{animation:none}}
