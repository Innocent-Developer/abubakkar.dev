<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG Image Template  screenshot at exactly 1200×630</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1200px;height:630px;background:#0A0E0D;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  body::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0 2px,rgba(34,197,94,.02) 2px 4px);pointer-events:none}
  .terminal{width:960px;background:#101614;border:1px solid #1E2A26;border-radius:14px;overflow:hidden;box-shadow:0 0 80px rgba(34,197,94,.08)}
  .bar{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid #1E2A26}
  .dot{width:14px;height:14px;border-radius:50%}
  .bar span{margin:0 auto;color:#8A9A93;font:13px 'JetBrains Mono',monospace}
  .body{padding:36px 40px;font-family:'JetBrains Mono',monospace;line-height:1.9}
  .p{color:#22C55E}.dim{color:#8A9A93}
  .name{font-size:52px;font-weight:700;color:#E8EFEC;margin:6px 0 18px}
  .role{font-size:26px;color:#E8EFEC}
  .loc{font-size:19px;color:#8A9A93;margin-top:18px}
  .cursor{display:inline-block;width:14px;height:30px;background:#22C55E;vertical-align:middle;margin-left:6px}
  .url{position:absolute;bottom:28px;right:44px;font:600 18px 'JetBrains Mono',monospace;color:#22C55E}
</style>
</head>
<body>
  <div class="terminal">
    <div class="bar">
      <span class="dot" style="background:#EF4444"></span>
      <span class="dot" style="background:#F59E0B"></span>
      <span class="dot" style="background:#22C55E"></span>
      <span>zsh  80×24</span>
    </div>
    <div class="body">
      <div class="dim"><span class="p">➜ ~</span> whoami</div>
      <div class="name">Abubakkar Sajid</div>
      <div class="dim"><span class="p">➜ ~</span> cat /etc/profile</div>
      <div class="role">Full-Stack Developer <span class="dim">·</span> Backend &amp; SaaS</div>
      <div class="loc">Lahore, Pakistan &nbsp;|&nbsp; Open to Remote &amp; Freelance<span class="cursor"></span></div>
    </div>
  </div>
  <div class="url">abubakkar.dev</div>
</body>
</html>
